name: 🔍 CI Backend

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/backend.yml"

env:
  POSTGRES_USER: user
  POSTGRES_PASSWORD: password
  POSTGRES_DB: dlms-db
  DATABASE_URL: postgresql+asyncpg://user:password@localhost:5432/dlms-db
  SECRET_KEY: ${{ secrets.SECRET_KEY || 'ci-only-secret-key-32-chars-long!!' }}
  DEBUG: "false"

jobs:
  # ─── Job 1: Lint ──────────────────────────────────────────────────────
  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install ruff
      - run: ruff check app/

  # ─── Job 2: Test ──────────────────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: lint

    env:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dlms-db

    steps:
      - uses: actions/checkout@v4

      - name: Create backend/.env
        run: |
          printf 'DATABASE_URL=postgresql+asyncpg://user:password@postgres:5432/dlms-db\n' > backend/.env
          printf 'SECRET_KEY=%s\n' "${{ secrets.SECRET_KEY || 'ci-only-secret-key-32-chars-long!!' }}" >> backend/.env
          printf 'DEBUG=false\n' >> backend/.env
          echo "=== backend/.env ===" && cat backend/.env

      - name: Start Postgres
        run: |
          docker compose up -d postgres
          echo "Waiting for postgres to be healthy..."
          for i in $(seq 1 30); do
            docker compose exec postgres pg_isready \
              -U $POSTGRES_USER -d $POSTGRES_DB && break || sleep 2
          done

      - name: Build backend-ci image
        run: docker compose --profile ci build backend-ci

      - name: Run Alembic migrations
        run: |
          docker compose --profile ci run --rm backend-ci \
            "PYTHONPATH=. alembic upgrade head"

      - name: Run tests
        run: |
          docker compose --profile ci run --rm backend-ci \
            "pip install pytest pytest-asyncio httpx -q && pytest tests/ -v --tb=short"

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ─── Job 3: Docker Build ──────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -t dlms-backend:pr-${{ github.event.pull_request.number }} \
            ./backend
