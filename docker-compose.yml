version: '3.8'

services:
  # Database PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: dlms-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-dlms-db}
    ports:
      - "5432:5432"
    volumes:
      - dlms_pg_data:/var/lib/postgresql/data
    networks:
      - dlms-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-dlms-db}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dlms-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-dlms-db}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dlms-network
    volumes:
      - ./backend/logs:/app/logs

  # FrontEnd React + Vite
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dlms-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - dlms-network
    volumes:
      - ./frontend:/app
      - /app/node_modules

networks:
  dlms-network:
    driver: bridge

volumes:
  dlms_pg_data:
